name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Compile Java Code
      run: |
        find src -name "*.java" -exec javac {} +
        find tests -name "*.java" -exec javac -cp src {} +

    - name: Run Dummy Tests
      run: |
        cd tests && java DemoTest

    - name: Build Docker Image
      run: docker build || true -t lab-env .
